name: Vavoo M3U Update

on:
  schedule:
    # Her 6 saatte bir otomatik çalışır (UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Manuel olarak başlatma butonu ekler

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # HATA DÜZELTME: aiohttp kütüphanesi eklendi
        pip install requests aiohttp

    - name: Run Vavoo Script
      run: |
        # Scripti çalıştırıp çıktıyı playlist.m3u dosyasına kaydeder
        # Not: Scriptin m3u çıktısı verecek şekilde ayarlı olması gerekir
        python vavoo_proxy.py > playlist.m3u

    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add playlist.m3u
        git commit -m "Update Vavoo Playlist [$(date)]" || exit 0
        git push
        
