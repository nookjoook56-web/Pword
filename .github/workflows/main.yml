name: Vavoo M3U Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests aiohttp

    - name: Run Vavoo Script
      run: |
        # Scripti çalıştır ve tüm çıktıyı (hata dahil) konsola yaz
        python vavoo_proxy.py
        # EĞER script kendi m3u dosyasını oluşturuyorsa, alttaki satırı yorumdan çıkar (satır başındaki # kaldır)
        # mv generated_playlist.m3u playlist.m3u
        
    - name: Check File Size
      run: |
        # Dosya gerçekten boş mu kontrol et
        ls -lh playlist.m3u

    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add playlist.m3u
        # Dosya boşsa commit yapma ve hata ver
        if [ ! -s playlist.m3u ]; then
          echo "Playlist is empty, skipping commit."
          exit 1
        fi
        git commit -m "Update Vavoo Playlist [$(date)]"
        git push
